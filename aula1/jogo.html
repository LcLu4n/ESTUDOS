<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>brincadeira</title>
</head>

<body>

    <div class="main">
        <div class="pedra">
            <button id="rock">Pedra</button>
        </div>

        <div class="papel">
            <button id="paper">Papel</button>
        </div>

        <div class="tesoura">
            <button id="scissors">Tesoura</button>
        </div>
    </div>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url(https://cdn.wallpapersafari.com/62/24/a8eSpq.jpg);
            background-size: cover;
            /* Faz a imagem cobrir toda a tela */
            background-position: center;
            /* Centraliza a imagem */
            background-repeat: no-repeat;
            /* Não repete a imagem */
            height: 100vh;
        }

        .main{
            display: flex;
            justify-content: center;
            gap: 50px;
             width: 50px;
            height: 50px;
            position: absolute;
            right: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        button{
            cursor: pointer;
        }
     
    </style>

</body>

</html>
