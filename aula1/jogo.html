<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>brincadeira jokenPo</title>
</head>

<body>

    <div class="main">
        <h1>JokenPO</h1>
        <br>
        <button id="rock">&#x270A;</button>
        <button id="paper">&#x1F590;</button>
        <button id="scissors">&#x270C;</button>
        <br>
        <p>Você está com: <span class="myScore">0</span></p>
        <p>Seu adversário está: <span class="adversario">0</span></p>
    </div>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            color: #fff;
        }

        body {
            background-image: url(https://cdn.wallpapersafari.com/62/24/a8eSpq.jpg);
            background-size: cover;
            /* Faz a imagem cobrir toda a tela */
            background-position: center;
            /* Centraliza a imagem */
            background-repeat: no-repeat;
            /* Não repete a imagem */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main {
            width: 300px;
            height: 300px;
            background: black;
        }

        h1{
            font-size: 50px;
            margin-left: 20px;
        }

        button{
            width: 60px;
            height: 60px;
            font-size: 30px;
            justify-content: center;
            align-items: center;
            margin-left: 28px;
            cursor: pointer;
        }

        p{
            position: relative;
            top: 50px;
            font-size: 20px;
            line-height: 15px;
            margin-top: 20px;
           margin-left: 15px;
        }

    </style>

</body>

<script src="jokenpo.js"></script>


</html>
